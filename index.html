<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تلاوات الشيخ أحمد عبد القادر | تجربة فريدة</title>
    
    <style>
        /* استدعاء الخط الخاص بك */
        @font-face {
            font-family: 'Thmanyah';
            src: url('thmanyahserifdisplay-Black.otf');
            font-weight: bold;
        }

        :root {
            --main-gold: #D4AF37;        
            --deep-brown: #3E2723;      
            --accent-gold: #FAD6A5;     
            --dark-bg: #0d0a07;         
            --glass: rgba(30, 20, 15, 0.75); 
            --text-light: #FDF5E6;      
            --royal-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Thmanyah', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            /* إضافة نمط زخرفي خفيف جداً في الخلفية */
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(62, 39, 35, 0.15) 0%, transparent 40%),
                url('https://www.transparenttextures.com/patterns/dark-matter.png');
        }

        /* تحسين الهيدر */
        header {
            padding: 50px 20px;
            text-align: center;
            z-index: 10;
        }

        .logo-container img {
            height: 140px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)) drop-shadow(0 0 15px rgba(212, 175, 55, 0.2));
            animation: fadeInDown 1.2s cubic-bezier(0.22, 1, 0.36, 1);
            transition: transform 0.5s ease;
        }
        
        .logo-container img:hover {
            transform: scale(1.05) rotate(2deg);
        }

        /* القسم الرئيسي */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            gap: 50px;
            margin-top: -30px;
        }

        .hero-text h1 {
            font-size: clamp(3rem, 7vw, 5.5rem);
            background: linear-gradient(180deg, var(--accent-gold) 0%, var(--main-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 15px;
            font-weight: 900;
            animation: fadeInUp 1s ease;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.6));
        }

        .hero-text p {
            text-align: center;
            font-size: 1.4rem;
            color: var(--accent-gold);
            opacity: 0.8;
            letter-spacing: 5px;
            font-weight: 300;
            animation: fadeInUp 1.4s ease;
            position: relative;
        }
        
        .hero-text p::after, .hero-text p::before {
            content: "✦";
            margin: 0 15px;
            font-size: 0.8rem;
            vertical-align: middle;
        }

        /* مشغل الصوت الاحترافي */
        .player-card {
            width: 100%;
            max-width: 650px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 60px;
            padding: 60px;
            box-shadow: var(--royal-shadow);
            animation: scaleIn 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        /* تأثير التوهج خلف الكارد */
        .player-card::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            z-index: -1;
        }

        .track-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .track-header h2 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* مشغل الصوت المخصص */
        audio {
            width: 100%;
            height: 60px;
            margin-bottom: 40px;
            filter: sepia(100%) saturate(150%) hue-rotate(350deg) brightness(1.2);
            border-radius: 30px;
        }

        .action-area {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .btn-modern {
            position: relative;
            background: linear-gradient(135deg, #4e342e 0%, var(--deep-brown) 100%);
            color: var(--accent-gold);
            padding: 22px 65px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.3rem;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-modern:hover {
            transform: translateY(-12px) scale(1.05);
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.25);
            background: linear-gradient(135deg, var(--deep-brown) 0%, #2b1d1a 100%);
            border-color: var(--main-gold);
        }

        .btn-modern::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.2), transparent);
            transition: 0.8s;
        }

        .btn-modern:hover::before {
            left: 100%;
        }

        /* Footer */
        footer {
            padding: 60px 20px;
            text-align: center;
            z-index: 10;
        }

        .footer-content p:first-child {
            font-size: 1.1rem;
            color: var(--main-gold);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .footer-content p:last-child {
            font-size: 0.85rem;
            opacity: 0.5;
            color: var(--accent-gold);
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* استجابة الموبايل */
        @media (max-width: 600px) {
            .player-card { padding: 40px 20px; width: 92%; border-radius: 45px; }
            .hero-text h1 { font-size: 2.8rem; }
            .hero-text p { font-size: 1.1rem; letter-spacing: 2px; }
            .btn-modern { padding: 18px 40px; font-size: 1.1rem; width: 100%; }
            .logo-container img { height: 110px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="https://i.ibb.co/B2SsvK2B/logo.png" alt="الشيخ أحمد عبد القادر">
        </div>
    </header>

    <main class="main-content">
        <div class="hero-text">
            <h1>تلاوات الشيخ أحمد عبد القادر</h1>
            <p>سَكِينَةٌ لِقَلْبِكَ.. وَنُورٌ لِدَرْبِكَ</p>
        </div>

        <div class="player-card">
            <div class="track-header">
                <h2>تلاوة عطرة</h2>
                <p style="color: var(--main-gold); font-size: 1.2rem; opacity: 0.9; margin-top: 5px;">القارئ أحمد عبد القادر</p>
            </div>

            <audio id="mainAudio" controls>
                <source src="https://server11.mp3quran.net/a_ahmed/001.mp3" type="audio/mpeg">
                متصفحك لا يدعم تشغيل الصوت.
            </audio>

            <div class="action-area">
                <a href="https://server11.mp3quran.net/a_ahmed/001.mp3" download class="btn-modern">
                    <span>تحميل التلاوة بجودة عالية MP3</span>
                </a>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>تم التصميم بواسطة Ab Maki &copy; 2026</p>
            <p>جميع الحقوق محفوظة لموقع تلاوات الشيخ أحمد عبد القادر</p>
        </div>
    </footer>

</body>
</html>
