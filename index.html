<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المقارن الاحترافي | Player Compare Pro 2026</title>
    <!-- إضافة مكتبة الأيقونات وخطوط جوجل -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- CSS: التنسيق والتصميم المطور --- */
        :root {
            --primary: #00ff88;
            --secondary: #6200ea;
            --bg: #05070a;
            --card-bg: rgba(22, 30, 45, 0.7);
            --text: #f8fafc;
            --accent: #f1c40f;
            --trophy: #FFD700;
            --danger: #ff4757;
        }

        * {
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(98, 0, 234, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 255, 136, 0.1) 0%, transparent 40%);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* تأثير الخلفية المتحركة */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1;
            z-index: -1;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 1s cubic-bezier(0.22, 1, 0.36, 1);
        }

        header h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--primary), #fff, var(--secondary));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .selectors {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            align-items: center;
            margin-bottom: 40px;
        }

        .player-box {
            position: relative;
        }

        .player-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
        }

        .player-box input {
            width: 100%;
            padding: 18px 45px 18px 15px;
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(15, 23, 42, 0.8);
            color: white;
            font-size: 1.1rem;
            transition: all 0.4s;
        }

        .player-box input:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 1);
            outline: none;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .vs-badge {
            font-size: 2rem;
            font-weight: 900;
            color: #fff;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(98, 0, 234, 0.5);
            border: 4px solid var(--bg);
            z-index: 2;
        }

        .btn-compare {
            grid-column: 1 / span 3;
            padding: 20px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(45deg, var(--secondary), #9333ea);
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-compare:hover {
            transform: scale(1.02);
            filter: brightness(1.2);
            box-shadow: 0 15px 40px rgba(98, 0, 234, 0.5);
        }

        .comparison-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 12px;
            margin-top: 30px;
            display: none;
        }

        .comparison-table th {
            padding: 25px;
            font-size: 1.8rem;
            font-weight: 900;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            color: var(--primary);
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .comparison-table td {
            padding: 20px;
            text-align: center;
            background: rgba(255,255,255,0.03);
            transition: 0.3s;
        }

        .comparison-table tr:hover td {
            background: rgba(255,255,255,0.07);
        }

        .stat-label {
            color: var(--accent);
            font-weight: 800;
            width: 20%;
            border-radius: 0;
            text-transform: uppercase;
        }

        .progress-container {
            width: 100%;
            height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            margin-top: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .progress-bar {
            height: 100%;
            border-radius: 20px;
            width: 0;
            transition: width 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            position: relative;
        }

        .progress-bar::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        .winner-text {
            color: var(--primary);
            font-weight: 900;
            font-size: 1.5rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .overall-score {
            font-size: 3rem;
            font-weight: 900;
            margin-top: 5px;
            display: block;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .selectors { grid-template-columns: 1fr; }
            .vs-badge { margin: 10px auto; }
            header h1 { font-size: 2rem; }
            .comparison-table th { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>المقارن الذكي <span style="color: var(--primary);">ULTIMATE</span></h1>
        <p>المنصة الأقوى لتحليل ومقارنة أساطير كرة القدم 2026</p>
    </header>

    <div class="container">
        <div class="selectors">
            <div class="player-box">
                <i class="fa-solid fa-user-ninja"></i>
                <input list="players" id="p1-input" placeholder="ابحث عن الأسطورة 1...">
            </div>

            <div class="vs-badge">VS</div>

            <div class="player-box">
                <i class="fa-solid fa-user-ninja"></i>
                <input list="players" id="p2-input" placeholder="ابحث عن الأسطورة 2...">
            </div>

            <datalist id="players"></datalist>

            <button class="btn-compare" onclick="startComparison()">
                <i class="fa-solid fa-microchip"></i>
                تحليل البيانات ومقارنة الأداء
            </button>
        </div>

        <table class="comparison-table" id="result-table">
            <thead>
                <tr>
                    <th id="name1">اللاعب الأول</th>
                    <th style="color: #94a3b8; font-size: 0.9rem;">إحصائيات الميدان</th>
                    <th id="name2">اللاعب الثاني</th>
                </tr>
            </thead>
            <tbody id="stats-body"></tbody>
            <tfoot>
                <tr style="background: rgba(0,255,136,0.05);">
                    <td id="overall1" class="overall-score">0</td>
                    <td class="stat-label">التقييم العام</td>
                    <td id="overall2" class="overall-score">0</td>
                </tr>
            </tfoot>
        </table>
    </div>

    <script>
        const playersDatabase = [
            { name: "ليونيل ميسي", goals: 838, assists: 374, pace: 78, shooting: 90, passing: 95, dribbling: 96, trophies: 44 },
            { name: "كريستيانو رونالدو", goals: 893, assists: 251, pace: 81, shooting: 94, passing: 80, dribbling: 82, trophies: 35 },
            { name: "كيليان مبابي", goals: 332, assists: 126, pace: 97, shooting: 90, passing: 82, dribbling: 92, trophies: 17 },
            { name: "إيرلينج هالاند", goals: 262, assists: 52, pace: 89, shooting: 95, passing: 70, dribbling: 78, trophies: 7 },
            { name: "محمد صلاح", goals: 345, assists: 142, pace: 90, shooting: 89, passing: 85, dribbling: 90, trophies: 11 },
            { name: "فينيسيوس جونيور", goals: 110, assists: 88, pace: 95, shooting: 84, passing: 82, dribbling: 96, trophies: 12 },
            { name: "كريم بنزيما", goals: 472, assists: 212, pace: 76, shooting: 88, passing: 84, dribbling: 86, trophies: 33 },
            { name: "كيفين دي بروين", goals: 172, assists: 288, pace: 74, shooting: 86, passing: 97, dribbling: 87, trophies: 22 },
            { name: "نيمار جونيور", goals: 436, assists: 248, pace: 85, shooting: 85, passing: 90, dribbling: 95, trophies: 28 },
            { name: "روبرت ليفاندوفسكي", goals: 654, assists: 152, pace: 75, shooting: 93, passing: 79, dribbling: 82, trophies: 29 },
            { name: "لوكا مودريتش", goals: 122, assists: 162, pace: 72, shooting: 78, passing: 93, dribbling: 90, trophies: 34 },
            { name: "زين الدين زيدان", goals: 156, assists: 167, pace: 78, shooting: 82, passing: 95, dribbling: 96, trophies: 15 },
            { name: "رونالدينيو", goals: 312, assists: 192, pace: 88, shooting: 84, passing: 91, dribbling: 97, trophies: 13 },
            { name: "لامين يامال", goals: 18, assists: 22, pace: 91, shooting: 81, passing: 88, dribbling: 94, trophies: 3 }
        ];

        const datalist = document.getElementById('players');
        playersDatabase.forEach(p => {
            let option = document.createElement('option');
            option.value = p.name;
            datalist.appendChild(option);
        });

        function calculateOverall(player) {
            const weights = { pace: 1, shooting: 2, passing: 2, dribbling: 2 };
            let total = (player.pace * weights.pace + player.shooting * weights.shooting + player.passing * weights.passing + player.dribbling * weights.dribbling) / 7;
            return Math.round(total);
        }

        function startComparison() {
            const p1Name = document.getElementById('p1-input').value;
            const p2Name = document.getElementById('p2-input').value;

            const p1 = playersDatabase.find(p => p.name === p1Name);
            const p2 = playersDatabase.find(p => p.name === p2Name);

            if (!p1 || !p2) {
                alert("عذراً، يرجى اختيار أسماء من القائمة المتاحة!");
                return;
            }

            document.getElementById('name1').innerText = p1.name;
            document.getElementById('name2').innerText = p2.name;

            const stats = [
                { label: "الأهداف الكلية", key: "goals", max: 1000, icon: "fa-solid fa-mound" },
                { label: "صناعة اللعب", key: "assists", max: 400, icon: "fa-solid fa-wand-magic-sparkles" },
                { label: "إجمالي البطولات", key: "trophies", max: 50, icon: "fa-solid fa-trophy" },
                { label: "سرعة الانفجار", key: "pace", max: 100, icon: "fa-solid fa-gauge-high" },
                { label: "قوة التسديد", key: "shooting", max: 100, icon: "fa-solid fa-gun" },
                { label: "دقة التمرير", key: "passing", max: 100, icon: "fa-solid fa-bullseye" },
                { label: "مهارة المراوغة", key: "dribbling", max: 100, icon: "fa-solid fa- footprints" }
            ];

            let html = "";
            stats.forEach(s => {
                const val1 = p1[s.key];
                const val2 = p2[s.key];
                const win1 = val1 > val2 ? "winner-text" : "";
                const win2 = val2 > val1 ? "winner-text" : "";
                
                const perc1 = (val1 / s.max) * 100;
                const perc2 = (val2 / s.max) * 100;

                html += `
                    <tr>
                        <td width="40%">
                            <div class="${win1}" style="font-size: 1.5rem;">${val1}</div>
                            <div class="progress-container"><div class="progress-bar" style="width: ${perc1}%; background: linear-gradient(90deg, #6200ea, #b794f4)"></div></div>
                        </td>
                        <td class="stat-label">
                            <i class="${s.icon}" style="display:block; margin-bottom:5px; font-size:1.2rem;"></i>
                            ${s.label}
                        </td>
                        <td width="40%">
                            <div class="${win2}" style="font-size: 1.5rem;">${val2}</div>
                            <div class="progress-container"><div class="progress-bar" style="width: ${perc2}%; background: linear-gradient(90deg, #00ff88, #80ffc5)"></div></div>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('stats-body').innerHTML = html;
            
            // تحديث التقييم العام
            const ov1 = calculateOverall(p1);
            const ov2 = calculateOverall(p2);
            document.getElementById('overall1').innerText = ov1;
            document.getElementById('overall2').innerText = ov2;
            document.getElementById('overall1').style.color = ov1 >= ov2 ? 'var(--primary)' : 'var(--danger)';
            document.getElementById('overall2').style.color = ov2 >= ov1 ? 'var(--primary)' : 'var(--danger)';

            document.getElementById('result-table').style.display = "table";
            
            // تمرير تلقائي للنتائج
            window.scrollTo({ top: document.getElementById('result-table').offsetTop - 50, behavior: 'smooth' });
        }
    </script>
</body>
</html>
