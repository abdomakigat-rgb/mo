<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المقارن الاحترافي | Player Compare Pro 2026</title>
    <!-- إضافة مكتبة الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- CSS: التنسيق والتصميم المطور --- */
        :root {
            --primary: #00ff88;
            --secondary: #6200ea;
            --bg: #0b0f1a;
            --card-bg: #161e2d;
            --text: #f8fafc;
            --accent: #f1c40f;
            --trophy: #FFD700;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .selectors {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 30px;
            align-items: center;
            margin-bottom: 40px;
        }

        .player-box input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #2d3748;
            background: #0f172a;
            color: white;
            font-size: 1.1rem;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .player-box input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        .vs-badge {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary);
            background: rgba(0, 255, 136, 0.1);
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 2px solid var(--primary);
        }

        .btn-compare {
            grid-column: 1 / span 3;
            padding: 18px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(45deg, var(--secondary), #7c3aed);
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(98, 0, 234, 0.3);
        }

        .btn-compare:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(98, 0, 234, 0.4);
        }

        .comparison-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 15px;
            margin-top: 20px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .comparison-table th {
            padding: 20px;
            font-size: 1.4rem;
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
        }

        .comparison-table td {
            padding: 15px;
            text-align: center;
            background: rgba(255,255,255,0.02);
        }

        .stat-label {
            color: var(--accent);
            font-weight: bold;
            font-size: 0.9rem;
            background: rgba(241, 196, 15, 0.05) !important;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .stat-label i {
            font-size: 1.2rem;
            margin-bottom: 2px;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: #2d3748;
            border-radius: 10px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            border-radius: 10px;
            transition: width 1s ease-in-out;
        }

        .winner {
            color: var(--primary);
            font-weight: bold;
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.6);
        }

        .trophy-count {
            color: var(--trophy);
            font-size: 1.4rem;
            font-weight: bold;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            .selectors { grid-template-columns: 1fr; }
            .vs-badge { display: none; }
            .btn-compare { grid-column: 1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>المقارن الذكي Pro</h1>
        <p>الجيل القادم من تحليل بيانات اللاعبين والبطولات 2026</p>
    </header>

    <div class="container">
        <div class="selectors">
            <div class="player-box">
                <input list="players" id="p1-input" placeholder="اسم اللاعب الأول...">
            </div>

            <div class="vs-badge">VS</div>

            <div class="player-box">
                <input list="players" id="p2-input" placeholder="اسم اللاعب الثاني...">
            </div>

            <datalist id="players"></datalist>

            <button class="btn-compare" onclick="startComparison()">بدء التحليل والمقارنة</button>
        </div>

        <table class="comparison-table" id="result-table">
            <thead>
                <tr>
                    <th id="name1">-</th>
                    <th style="width: 20%; color: #94a3b8; font-size: 1rem;">المقاييس</th>
                    <th id="name2">-</th>
                </tr>
            </thead>
            <tbody id="stats-body"></tbody>
        </table>
    </div>

    <script>
        // --- JS المطور مع بيانات حقيقية وبطولات ---

        const playersDatabase = [
            { name: "ليونيل ميسي", goals: 838, assists: 374, pace: 78, shooting: 90, passing: 95, dribbling: 96, trophies: 44 },
            { name: "كريستيانو رونالدو", goals: 893, assists: 251, pace: 81, shooting: 94, passing: 80, dribbling: 82, trophies: 35 },
            { name: "كيليان مبابي", goals: 332, assists: 126, pace: 97, shooting: 90, passing: 82, dribbling: 92, trophies: 17 },
            { name: "إيرلينج هالاند", goals: 262, assists: 52, pace: 89, shooting: 95, passing: 70, dribbling: 78, trophies: 7 },
            { name: "محمد صلاح", goals: 345, assists: 142, pace: 90, shooting: 89, passing: 85, dribbling: 90, trophies: 11 },
            { name: "فينيسيوس جونيور", goals: 110, assists: 88, pace: 95, shooting: 84, passing: 82, dribbling: 96, trophies: 12 },
            { name: "كريم بنزيما", goals: 472, assists: 212, pace: 76, shooting: 88, passing: 84, dribbling: 86, trophies: 33 },
            { name: "كيفين دي بروين", goals: 172, assists: 288, pace: 74, shooting: 86, passing: 97, dribbling: 87, trophies: 22 },
            { name: "نيمار جونيور", goals: 436, assists: 248, pace: 85, shooting: 85, passing: 90, dribbling: 95, trophies: 28 },
            { name: "روبرت ليفاندوفسكي", goals: 654, assists: 152, pace: 75, shooting: 93, passing: 79, dribbling: 82, trophies: 29 },
            { name: "لوكا مودريتش", goals: 122, assists: 162, pace: 72, shooting: 78, passing: 93, dribbling: 90, trophies: 34 },
            { name: "زين الدين زيدان", goals: 156, assists: 167, pace: 78, shooting: 82, passing: 95, dribbling: 96, trophies: 15 },
            { name: "رونالدينيو", goals: 312, assists: 192, pace: 88, shooting: 84, passing: 91, dribbling: 97, trophies: 13 },
            { name: "لامين يامال", goals: 18, assists: 22, pace: 91, shooting: 81, passing: 88, dribbling: 94, trophies: 3 }
        ];

        const datalist = document.getElementById('players');
        playersDatabase.forEach(p => {
            let option = document.createElement('option');
            option.value = p.name;
            datalist.appendChild(option);
        });

        function startComparison() {
            const p1Name = document.getElementById('p1-input').value;
            const p2Name = document.getElementById('p2-input').value;

            const p1 = playersDatabase.find(p => p.name === p1Name);
            const p2 = playersDatabase.find(p => p.name === p2Name);

            if (!p1 || !p2) {
                alert("يرجى اختيار لاعبين صحيحين من القائمة!");
                return;
            }

            document.getElementById('name1').innerText = p1.name;
            document.getElementById('name2').innerText = p2.name;

            const stats = [
                { label: "الأهداف", key: "goals", max: 1000, icon: "fa-solid fa-bullseye" },
                { label: "الأسيست", key: "assists", max: 400, icon: "fa-solid fa-hands-helping" },
                { label: "البطولات", key: "trophies", max: 50, icon: "fa-solid fa-trophy" },
                { label: "السرعة", key: "pace", max: 100, icon: "fa-solid fa-bolt" },
                { label: "التسديد", key: "shooting", max: 100, icon: "fa-solid fa-fire" },
                { label: "التمرير", key: "passing", max: 100, icon: "fa-solid fa-route" },
                { label: "المراوغة", key: "dribbling", max: 100, icon: "fa-solid fa-wand-magic-sparkles" }
            ];

            let html = "";
            stats.forEach(s => {
                const val1 = p1[s.key];
                const val2 = p2[s.key];
                const win1 = val1 > val2 ? "winner" : "";
                const win2 = val2 > val1 ? "winner" : "";
                
                const perc1 = (val1 / s.max) * 100;
                const perc2 = (val2 / s.max) * 100;

                const extraClass = s.key === "trophies" ? "trophy-count" : "";

                html += `
                    <tr>
                        <td width="40%">
                            <div class="${win1} ${extraClass}">${val1}</div>
                            <div class="progress-container"><div class="progress-bar" style="width: ${perc1}%; background: var(--secondary)"></div></div>
                        </td>
                        <td class="stat-label">
                            <i class="${s.icon}"></i>
                            ${s.label}
                        </td>
                        <td width="40%">
                            <div class="${win2} ${extraClass}">${val2}</div>
                            <div class="progress-container"><div class="progress-bar" style="width: ${perc2}%; background: var(--primary)"></div></div>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('stats-body').innerHTML = html;
            document.getElementById('result-table').style.display = "table";
        }
    </script>
</body>
</html>
