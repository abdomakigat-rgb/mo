<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تلاوات الشيخ أحمد عبد القادر | تجربة فريدة</title>
    
    <style>
        /* استدعاء الخط الخاص بك */
        @font-face {
            font-family: 'Thmanyah';
            src: url('thmanyahserifdisplay-Black.otf');
            font-weight: bold;
        }

        :root {
            /* الألوان مستوحاة بدقة من الصورة المرفقة */
            --main-gold: #D4AF37;        /* ذهبي ملكي */
            --deep-brown: #3E2723;      /* بني محروق من الصورة */
            --accent-gold: #FAD6A5;     /* بيج ذهبي فاتح */
            --dark-bg: #1A120B;         /* خلفية داكنة مائلة للبني */
            --glass: rgba(62, 39, 35, 0.6); /* زجاجي بني دافئ */
            --text-light: #FDF5E6;      /* لون كريمي للنصوص */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Thmanyah', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            /* خلفية بتدرج إشعاعي يعطي عمقاً فخماً */
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(212, 175, 55, 0.1) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(62, 39, 35, 0.2) 0%, transparent 35%);
        }

        /* تحسين الهيدر */
        header {
            padding: 40px;
            text-align: center;
            z-index: 10;
        }

        .logo-container img {
            height: 130px;
            filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.4));
            animation: fadeInDown 1.2s ease;
        }

        /* القسم الرئيسي بتصميم جبار */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            gap: 40px;
        }

        .hero-text h1 {
            font-size: clamp(2.8rem, 6vw, 5rem);
            background: linear-gradient(to bottom, var(--accent-gold), var(--main-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 10px;
            animation: fadeInUp 1s ease;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        .hero-text p {
            text-align: center;
            font-size: 1.3rem;
            color: var(--accent-gold);
            opacity: 0.9;
            letter-spacing: 3px;
            animation: fadeInUp 1.4s ease;
        }

        /* مشغل الصوت المودرن الزجاجي */
        .player-card {
            width: 100%;
            max-width: 600px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 50px;
            padding: 50px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            animation: scaleIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        /* إضافة لمسة فنية حول الكارد */
        .player-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 52px;
            padding: 2px;
            background: linear-gradient(45deg, transparent, var(--main-gold), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.5;
        }

        .track-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .track-header h2 {
            color: var(--accent-gold);
            font-size: 2.2rem;
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        /* تعديل شكل الـ Audio Player */
        audio {
            width: 100%;
            height: 55px;
            margin-bottom: 35px;
            filter: sepia(100%) saturate(200%) hue-rotate(350deg) brightness(1.1) contrast(1.1);
        }

        .action-area {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn-modern {
            position: relative;
            background: linear-gradient(135deg, var(--deep-brown) 0%, #5D4037 100%);
            color: var(--accent-gold);
            padding: 20px 50px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            transition: 0.5s all cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            border: 1px solid var(--main-gold);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-modern:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 45px rgba(212, 175, 55, 0.3);
            color: #fff;
            border-color: #fff;
        }

        .btn-modern::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.6s;
        }

        .btn-modern:hover::after {
            left: 100%;
        }

        /* Footer */
        footer {
            padding: 50px;
            text-align: center;
            font-size: 1rem;
            color: var(--main-gold);
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            opacity: 0.8;
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        /* استجابة الموبايل */
        @media (max-width: 600px) {
            .player-card { padding: 35px 25px; width: 92%; }
            .hero-text h1 { font-size: 2.5rem; }
            .btn-modern { padding: 15px 30px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="https://i.ibb.co/B2SsvK2B/logo.png" alt="الشيخ أحمد عبد القادر">
        </div>
    </header>

    <main class="main-content">
        <div class="hero-text">
            <h1>تلاوات الشيخ أحمد عبد القادر</h1>
            <p>سَكِينَةٌ لِقَلْبِكَ.. وَنُورٌ لِدَرْبِكَ</p>
        </div>

        <div class="player-card">
            <div class="track-header">
                <h2>تلاوة عطرة</h2>
                <p style="color: var(--main-gold); font-size: 1.1rem; opacity: 0.9;">بصوت الشيخ أحمد عبد القادر</p>
            </div>

            <audio id="mainAudio" controls>
                <source src="https://server11.mp3quran.net/a_ahmed/001.mp3" type="audio/mpeg">
                متصفحك لا يدعم تشغيل الصوت.
            </audio>

            <div class="action-area">
                <a href="https://server11.mp3quran.net/a_ahmed/001.mp3" download class="btn-modern">
                    <span>تحميل التلاوة MP3</span>
                </a>
            </div>
        </div>
    </main>

    <footer>
        <p>تم التصميم بواسطة Ab Maki &copy; 2026</p>
        <p style="font-size: 0.8rem; margin-top: 15px; opacity: 0.6; letter-spacing: 1px;">جميع الحقوق محفوظة لموقع تلاوات الشيخ أحمد عبد القادر</p>
    </footer>

</body>
</html>
